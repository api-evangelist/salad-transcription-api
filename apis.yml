    name: Salad Transcription API
    description: >-
      Salad Transcription API converts speech to text using distributed GPU inference.
      Supports 97 languages, speaker diarization, word-level timestamps, and SRT
      caption generation for audio (AIFF, FLAC, M4A, MP3, WAV) and video (MP4, MKV,
      MOV, WEBM, WMA) files.
